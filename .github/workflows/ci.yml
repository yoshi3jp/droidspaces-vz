name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  swiftpm:
    name: SwiftPM / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS 26 Intel
            runner: macos-26-intel
            expected_arch: x86_64
            kernel_url: https://github.com/yoshi3jp/vz-kernel/releases/download/v6.12.94/kernel-x86_64-6.12.94.tar.zst
            ramfs_artifact_id: '7797184775'
          - name: macOS 26 arm64
            runner: macos-26
            expected_arch: arm64
            kernel_url: https://github.com/yoshi3jp/vz-kernel/releases/download/v6.12.94/kernel-arm64-6.12.94.tar.zst
            ramfs_artifact_id: '7797193752'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show host and toolchain
        run: |
          sw_vers
          uname -a
          echo "expected arch: ${{ matrix.expected_arch }}"
          echo "actual arch:   $(uname -m)"
          test "$(uname -m)" = "${{ matrix.expected_arch }}"
          xcodebuild -version
          swift --version

      - name: Install CI tools
        run: |
          if ! command -v zstd >/dev/null 2>&1; then
            brew install zstd
          fi

      - name: Build
        run: swift build -v

      - name: Sign debug binary
        run: scripts/sign-debug.sh .build/debug/dsvz

      - name: Show entitlements
        run: codesign --display --entitlements :- .build/debug/dsvz

      - name: Smoke test signed binary
        run: |
          .build/debug/dsvz version
          .build/debug/dsvz help
          .build/debug/dsvz run --help

      - name: Fetch kernel and ramfs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          scripts/fetch-ci-payload.sh \
            "${{ matrix.expected_arch }}" \
            "${{ matrix.kernel_url }}" \
            "${{ matrix.ramfs_artifact_id }}" \
            ci-payload

      - name: Package local boot-test bundle
        run: |
          scripts/package-ci-bundle.sh \
            "${{ matrix.expected_arch }}" \
            .build/debug/dsvz \
            ci-payload \
            dist

      - name: Upload local boot-test bundle
        uses: actions/upload-artifact@v4
        with:
          name: dsvz-macos-${{ matrix.expected_arch }}
          path: |
            dist/dsvz-macos-${{ matrix.expected_arch }}.tar.gz
            dist/dsvz-macos-${{ matrix.expected_arch }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish ci-latest release
    needs: swiftpm
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged bundles
        uses: actions/download-artifact@v4
        with:
          pattern: dsvz-macos-*
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: find release-assets -maxdepth 1 -type f -print | sort

      - name: Publish ci-latest prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag=ci-latest
          notes_file=$(mktemp)

          cat > "$notes_file" <<EOF_NOTES
          Automated development prerelease for local Droidspaces VZ boot testing.

          Commit: $GITHUB_SHA

          Download the archive matching your Mac architecture, extract it, and run:

              ./run-local-smoke.sh

          GitHub-hosted macOS runners currently build and sign dsvz, but VM boot
          testing is expected to be performed on real local Mac hardware.
          EOF_NOTES

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes --cleanup-tag
          else
            git push --delete origin "$tag" >/dev/null 2>&1 || true
          fi

          git tag -f "$tag" "$GITHUB_SHA"
          git push -f origin "refs/tags/$tag"

          gh release create "$tag" \
            release-assets/* \
            --title "Droidspaces VZ CI latest" \
            --notes-file "$notes_file" \
            --prerelease \
            --latest=false
